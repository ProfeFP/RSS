<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSS News Reader</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f8ff;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .card {
            border: 1px solid #007bff;
            border-radius: 5px;
            padding: 10px;
            margin: 10px 0;
            background-color: white;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        header {
            display: flex;
            align-items: center;
            background-color: #007bff;
            color: white;
            padding: 10px;
            border-radius: 5px;
        }
        header img {
            width: 50px;
            height: 50px;
            margin-right: 10px;
        }
        h1 {
            margin: 0;
        }
        .search {
            margin: 20px 0;
        }
        .search input {
            padding: 10px;
            font-size: 16px;
            width: calc(100% - 22px);
            border: 1px solid #007bff;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <header>
        <img src="logo.svg" alt="Logo">
        <h1>RSS News Reader</h1>
    </header>
    <div class="search">
        <input type="text" id="searchInput" placeholder="Search news..." oninput="searchNews()">
    </div>
    <div id="newsContainer"></div>
    <script>
        const newsContainer = document.getElementById('newsContainer');
        const searchInput = document.getElementById('searchInput');
        let newsData = [];

        function fetchNews() {
            const rssFeedUrl = 'https://news.ycombinator.com/rss'; // Example RSS feed
            fetch(rssFeedUrl)
                .then(response => response.text())
                .then(data => {
                    const parser = new DOMParser();
                    const xml = parser.parseFromString(data, 'text/xml');
                    const items = xml.querySelectorAll('item');
                    items.forEach(item => {
                        const title = item.querySelector('title').textContent;
                        const link = item.querySelector('link').textContent;
                        newsData.push({ title, link });
                        renderNews({ title, link });
                    });
                    localStorage.setItem('newsData', JSON.stringify(newsData));
                });
        }

        function renderNews(newsItem) {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<h2>${newsItem.title} 😊</h2>\n<p><a href='${newsItem.link}' target='_blank'>Read more</a></p>`;
            newsContainer.appendChild(card);
        }

        function searchNews() {
            const query = searchInput.value.toLowerCase();
            newsContainer.innerHTML = '';
            const filteredNews = newsData.filter(item => item.title.toLowerCase().includes(query));
            filteredNews.forEach(renderNews);
        }

        window.onload = () => {
            if (localStorage.getItem('newsData')) {
                newsData = JSON.parse(localStorage.getItem('newsData'));
                newsData.forEach(renderNews);
            } else {
                fetchNews();
            }
        };
    </script>
</body>
</html>
