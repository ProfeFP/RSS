<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>RSS News Reader</title>\n    <style>\n        body { font-family: Arial, sans-serif; }\n        .news-item { border: 1px solid #ccc; margin: 10px; padding: 10px; }\n    </style>\n</head>\n<body>\n    <h1>RSS News Reader</h1>\n    <div id="news-container"></div>\n    <script>\n        async function fetchRSS() {\n            const response = await fetch('https://rss.nytimes.com/services/xml/rss/nyt/HomePage.xml');\n            const str = await response.text();\n            const parser = new DOMParser();\n            const xml = parser.parseFromString(str, "text/xml");\n            const items = xml.querySelectorAll('item');\n\n            const newsContainer = document.getElementById('news-container');\n            items.forEach(item => {\n                const title = item.querySelector('title').textContent;\n                const link = item.querySelector('link').textContent;\n                newsContainer.innerHTML += `<div class='news-item'><h2><a href='${link}' target='_blank'>${title}</a></h2></div>`;\n            });\n        }\n        fetchRSS();\n    <\/script>\n</body>\n</html>
