<!DOCTYPE html>\n<html lang='en'>\n<head>\n    <meta charset='UTF-8'>\n    <meta name='viewport' content='width=device-width, initial-scale=1.0'>\n    <title>RSS Reader</title>\n    <style>\n        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background-color: #f4f4f4; }\n        .container { max-width: 800px; margin: auto; padding: 20px; }\n        h1 { text-align: center; }\n        .feed { display: flex; flex-wrap: wrap; gap: 20px; }\n        .card { background: white; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); padding: 15px; width: calc(33.333% - 20px); }\n        img { max-width: 100%; border-radius: 5px; }\n        button { margin: 10px 0; }\n        @media (max-width: 768px) {\n            .card { width: calc(50% - 20px); }\n        }\n        @media (max-width: 480px) {\n            .card { width: 100%; }\n        }\n    </style>\n</head>\n<body>\n    <div class='container'>\n        <h1>RSS Reader</h1>\n        <div class='feed' id='feed'></div>\n        <button id='addFeed'>Add RSS Feed</button>\n        <input type='text' id='feedUrl' placeholder='Enter RSS Feed URL' style='display:none;'>\n        <button id='searchFeed'>Search</button>\n    </div>\n    <script>\n        const feeds = ['https://feeds.elpais.com/mrss-s/pages/ep/site/elpais.com/portada', 'https://www.aemet.es/es/barometro/feeds/rss', 'https://www.elperiodico.com/es/rss'];\n        const feedContainer = document.getElementById('feed');\n        let addedFeeds = JSON.parse(localStorage.getItem('feeds')) || feeds;\n\n        function loadFeeds() {\n            feedContainer.innerHTML = '';\n            addedFeeds.forEach(feedUrl => {\n                fetch(`https://cors-anywhere.herokuapp.com/${feedUrl}`)\n                    .then(response => response.text())\n                    .then(str => new window.DOMParser().parseFromString(str, 'text/xml'))\n                    .then(data => {\n                        const items = data.querySelectorAll('item');\n                        items.forEach(el => {\n                            const title = el.querySelector('title').textContent;\n                            const image = el.querySelector('image') ? el.querySelector('image').textContent : '';\n                            const description = el.querySelector('description') ? el.querySelector('description').textContent : '';\n                            const pubDate = new Date(el.querySelector('pubDate').textContent).toLocaleString();\n                            feedContainer.innerHTML += `<div class='card'>\n                                <img src='${image}' alt='${title}'/>\n                                <h3>${title}</h3>\n                                <p>${description}</p>\n                                <p>${pubDate}</p>\n                            </div>`;\n                        });\n                    });\n            });\n        }\n\n        document.getElementById('addFeed').addEventListener('click', () => {\n            const feedUrl = prompt('Enter the RSS feed URL:');\n            if (feedUrl) {\n                addedFeeds.push(feedUrl);\n                localStorage.setItem('feeds', JSON.stringify(addedFeeds));\n                loadFeeds();\n            }\n        });\n\n        document.getElementById('searchFeed').addEventListener('click', () => {\n            const query = document.getElementById('feedUrl').value;\n            const filteredFeeds = addedFeeds.filter(feedUrl => feedUrl.includes(query));\n            addedFeeds = filteredFeeds;\n            loadFeeds();\n        });\n\n        setInterval(loadFeeds, 900000); // Refresh every 15 minutes\n        loadFeeds();\n    </script>\n</body>\n</html>
